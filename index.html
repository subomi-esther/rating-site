<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ratings</title>
    <link rel="stylesheet" media="screen and (min-width:500px)" href="index.css">
    <link rel="stylesheet" media="screen and (max-width:430px)" href="mobile.css">
</head>
<body>
    <main id="main">
        <div class="starDiv">
            <img src="images/icon-star.svg" height="30px"  width="30px"  alt="">
        </div>

        <h1>How did we do?</h1>

        <p>Please let us know how we did with your support request. 
        All feedback is appreciated to help us improve our offering!</p>

        <form id="form"  action="">
         <div class="numberBtn" >
            <input required  class="btn" type="button" value="1">
            <input required class="btn" type="button" value="2">
            <input required class="btn" type="button" value="3">
            <input required  class="btn" type="button" value="4">
            <input required="btn" class="btn" type="button" value="5">

         </div>

         <button id="submitBtn" disabled  type="submit">SUBMIT</button>

 

        </form>
    </main>

    <div hidden id="successBox">
        <div class="successDiv">
                    <img src="images/illustration-thank-you.svg" alt="">
        <div>You selected <span id="selected">4</span> out of 5</div>
        <h2>Thank you!</h2>
        <p>We appreciate you taking the time to give a rating.
        If you ever need more support, don't hesitate to get in touch</p>

        </div>



    </div>
    <script src="index.js"></script>
</body>
</html>
